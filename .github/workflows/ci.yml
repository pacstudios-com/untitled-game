name: ci

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install gdtoolkit
        run: pip3 install gdtoolkit

      - name: lint gdscript
        run: gdlint **/*.gd || true

      - name: check formatting
        run: gdformat --check **/*.gd || true
